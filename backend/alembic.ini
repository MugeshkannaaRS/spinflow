[alembic]
script_location = alembic
prepend_sys_path = .
# Overridden at runtime by alembic/env.py → app.core.config.settings.DATABASE_URL
# Keep placeholder for offline generation:
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost:5432/db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
